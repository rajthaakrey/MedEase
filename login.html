<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log in — MedEase</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>

  <a href="index.html" class="auth-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to home
  </a>

  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-mark">M</div>
      <span class="auth-logo-name">MedEase</span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Log in to your pharmacy dashboard</p>

    <form class="auth-form" onsubmit="handleLogin(event)">

      <div class="auth-field" id="fieldEmail">
        <label class="auth-label">Email address</label>
        <div class="auth-input-wrap">
          <span class="auth-input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </span>
          <input type="email" id="loginEmail" class="auth-input" placeholder="you@pharmacy.com" autocomplete="email"/>
        </div>
        <span class="auth-error-msg">Please enter a valid email address</span>
      </div>

      <div class="auth-field" id="fieldPassword">
        <label class="auth-label">Password</label>
        <div class="auth-input-wrap">
          <span class="auth-input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" id="loginPassword" class="auth-input" placeholder="Enter your password" autocomplete="current-password"/>
          <button type="button" class="auth-pw-toggle" onclick="togglePw('loginPassword', this)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="auth-error-msg">Password is required</span>
      </div>

      <div class="auth-extras">
        <div class="auth-checkbox-wrap" onclick="toggleCheckbox(this)">
          <div class="auth-checkbox" id="rememberCheck"></div>
          <span class="auth-checkbox-label">Remember me</span>
        </div>
        <a href="forgot-pass.html" class="auth-forgot">Forgot password?</a>
      </div>

      <button type="submit" class="auth-submit">
        <span class="btn-spinner"></span>
        <span class="btn-text">Log in</span>
        <svg class="btn-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>

    </form>

    <div class="auth-switch" style="margin-top:16px;">
      Don't have an account? <a href="signup.html">Get started free</a>
    </div>

    <div class="auth-trust">
      <div class="auth-trust-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Free forever</div>
      <div class="auth-trust-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Secure login</div>
      <div class="auth-trust-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>No credit card</div>
    </div>

  </div>

  <script>
    function initInputStates() {
      document.querySelectorAll('.auth-input').forEach(function (input) {
        var wrap = input.parentElement;
        var validIcon = document.createElement('span');
        validIcon.className = 'auth-valid-icon';
        validIcon.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
        wrap.appendChild(validIcon);

        input.addEventListener('blur', function () {
          var field = input.closest('.auth-field');
          var hasError = field && field.classList.contains('has-error');
          if (input.value.trim() && !hasError) {
            input.classList.add('auth-input-filled');
            input.classList.remove('auth-input-error');
            validIcon.classList.add('visible');
          } else if (!input.value.trim()) {
            input.classList.remove('auth-input-filled');
            validIcon.classList.remove('visible');
          }
        });

        input.addEventListener('focus', function () {
          input.classList.remove('auth-input-filled');
          validIcon.classList.remove('visible');
        });

        input.addEventListener('input', function () {
          if (input.classList.contains('auth-input-error')) {
            var field = input.closest('.auth-field');
            if (field) field.classList.remove('has-error');
            input.classList.remove('auth-input-error');
          }
        });
      });
    }

    document.addEventListener('DOMContentLoaded', initInputStates);

    function togglePw(id, btn) {
      var el = document.getElementById(id);
      var isText = el.type === 'text';
      el.type = isText ? 'password' : 'text';
      btn.innerHTML = isText
        ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
        : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    }

    function toggleCheckbox(wrap) {
      wrap.querySelector('.auth-checkbox').classList.toggle('checked');
    }

    function handleLogin(e) {
      e.preventDefault();
      var email = document.getElementById('loginEmail');
      var pw    = document.getElementById('loginPassword');
      var btn = document.querySelector('#fieldPassword').closest('form').querySelector('.auth-submit');
      var valid = true;

      function setErr(fId, el, show) {
        document.getElementById(fId).classList.toggle('has-error', show);
        el.classList.toggle('auth-input-error', show);
        if (show) { el.classList.remove('auth-input-filled'); valid = false; }
      }

      setErr('fieldEmail',    email, !email.value || !email.value.includes('@'));
      setErr('fieldPassword', pw,    !pw.value);

      if (!valid) return;

btn.classList.add('btn-loading');
btn.querySelector('.btn-text').textContent = 'Logging in…';

fetch('http://127.0.0.1:8000/auth/login', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({
    email:    email.value,
    password: pw.value
  })
})
.then(function(res) { return res.json(); })
.then(function(data) {
  if (data.access_token) {
    localStorage.setItem('medease_token', data.access_token);
    localStorage.setItem('medease_user', JSON.stringify(data.user));
    btn.classList.remove('btn-loading');
    btn.classList.add('btn-success');
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Logged in';
    setTimeout(function() {
      window.location.href = 'dashboard.html';
    }, 800);
  } else {
    btn.classList.remove('btn-loading');
    btn.querySelector('.btn-text').textContent = 'Log in';
    // Show error under password field
    document.getElementById('fieldPassword').classList.add('has-error');
    document.getElementById('fieldPassword').querySelector('.auth-error-msg').textContent = data.detail || 'Incorrect email or password';
    document.getElementById('fieldPassword').querySelector('.auth-error-msg').style.display = 'block';
    document.getElementById('loginPassword').classList.add('auth-input-error');
  }
})
.catch(function() {
  btn.classList.remove('btn-loading');
  btn.querySelector('.btn-text').textContent = 'Log in';
  alert('Cannot connect to server. Make sure the backend is running.');
});
    }
  </script>
</body>
</html>
